name: Android CI (diagnostic)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List repo files
        run: |
          echo "Working dir: $(pwd)"
          ls -la
          echo "--- tree ---"
          find . -maxdepth 3 -type f -print | sed -e 's/^/FILE: /'

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Show Java version
        run: java -version || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0.2'

      - name: Show Gradle version
        run: |
          echo "Which gradle:"; which gradle || true
          gradle --version || true

      - name: Show top-level build.gradle
        run: |
          echo "---- build.gradle ----"
          sed -n '1,200p' build.gradle || true

      - name: Install Android SDK commandline tools
        env:
          ANDROID_HOME: ${{ runner.temp }}/android-sdk
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          curl -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools.zip
          mv cmdline-tools latest
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set ANDROID_HOME
        run: |
          echo "ANDROID_SDK_ROOT=${{ runner.temp }}/android-sdk" >> $GITHUB_ENV
          echo "PATH=${{ runner.temp }}/android-sdk/cmdline-tools/latest/bin:${PATH}" >> $GITHUB_ENV

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          yes | ${{ runner.temp }}/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate Gradle wrapper
        run: |
          set -x
          echo "Generating gradle wrapper..."
          gradle wrapper --gradle-version 8.0.2 || { echo "gradle wrapper failed"; ls -la; exit 1; }

      - name: Show wrapper files
        run: ls -la gradle/wrapper || true

      - name: Build Debug APK
        env:
          ANDROID_HOME: ${{ runner.temp }}/android-sdk
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          chmod +x ./gradlew || true
          ./gradlew assembleDebug --warning-mode all || { echo "./gradlew failed"; ls -la; cat app/build.gradle || true; exit 1; }

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
